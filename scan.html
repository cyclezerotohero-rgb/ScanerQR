<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Scan - สะสมขวด</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background-color: #285B48; color: white; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .logo-top { width: 120px; margin-top: 10px; }
        .user-greeting { font-size: 1.2rem; color: #FFD700; margin: 10px 0; font-weight: bold; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 4px solid #FFD700; background: black; margin-bottom: 10px; }
        .status-text { font-size: 1rem; margin: 10px 0; color: #FFD700; height: 1.5em; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: 700; border: none; margin-bottom: 10px; cursor: pointer; }
        .btn-yellow { background-color: #FFD700; color: #285B48; }
        .btn-green { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <img src="CYCLE.png" alt="Logo" class="logo-top">
        <div class="user-greeting" id="user-display">สวัสดีคุณสมาชิก</div>
        
        <div id="reader"></div>
        <div class="status-text" id="status">กำลังเปิดกล้อง...</div>
        
        <span style="text-decoration: underline; cursor: pointer; font-size: 0.8rem; opacity: 0.7;" onclick="location.reload()">รีเซ็ตกล้อง</span>
        
        <button class="btn btn-yellow" onclick="resumeScan()">สแกนขวดเพิ่ม</button>
        <button class="btn btn-green" id="confirmBtn" onclick="confirmData()">ยืนยันข้อมูล (รวม <span id="count-num">0</span> ชิ้น)</button>
        
        <div id="history-list" style="text-align: left; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; font-size: 0.9rem;">
            รายการ:
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyy-_ZTGLnwEFDiGV71Zj1gi5t9VoUPxrOfB2CuHHruqHPkP96wqNSHcMguE4Ui3hM/exec";
        let scannedItems = [];
        let isScanning = true;
        let html5QrCode;

        // ดึงชื่อมาแสดง
        const userName = localStorage.getItem('cycle_user_name') || "คุณสมาชิก";
        document.getElementById('user-display').innerText = "สวัสดีคุณ " + userName;

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 150 } },
                (decodedText) => {
                    if (!isScanning || scannedItems.includes(decodedText)) return;
                    scannedItems.push(decodedText);
                    document.getElementById('status').innerText = "✅ พบขวดรหัส: " + decodedText;
                    document.getElementById('count-num').innerText = scannedItems.length;
                    const item = document.createElement('div');
                    item.innerHTML = `✓ ${decodedText}`;
                    document.getElementById('history-list').appendChild(item);
                    isScanning = false; 
                }
            ).catch(err => {
                document.getElementById('status').innerText = "❌ กรุณาอนุญาตให้ใช้กล้อง";
            });
        }

        function resumeScan() {
            isScanning = true;
            document.getElementById('status').innerText = "กำลังรอสแกนขวดต่อไป...";
        }

        async function confirmData() {
            const userId = localStorage.getItem('cycle_user_id') || "GUEST";
            if (scannedItems.length === 0) return alert("ยังไม่ได้สแกนเลยครับ");
            
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.innerText = "กำลังบันทึกแต้ม...";

            try {
                await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({
                        action: "scan",
                        lineId: userId,
                        bottleCount: scannedItems.length,
                        bottleIds: scannedItems
                    }) 
                });
                alert('บันทึกสำเร็จ ' + scannedItems.length + ' ขวด');
                location.reload(); 
            } catch (err) { alert('ผิดพลาด'); btn.disabled = false; }
        }

        window.onload = startCamera;
    </script>
</body>
</html>
