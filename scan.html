<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Scan - สะสมแต้ม</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background-color: #285B48; color: white; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .logo-top { width: 100px; margin-top: 10px; }
        .user-greeting { font-size: 1.2rem; color: #FFD700; margin: 15px 0; font-weight: bold; }
        
        /* ส่วนกล่องสแกน */
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 4px solid #FFD700; background: black; margin-bottom: 10px; }
        .status-text { font-size: 1rem; margin: 10px 0; color: #FFD700; min-height: 1.5em; }
        
        /* ปุ่มกด */
        .btn { width: 100%; padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: 700; border: none; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .btn-yellow { background-color: #FFD700; color: #285B48; box-shadow: 0 4px 0 #c7a800; }
        .btn-yellow:active { transform: translateY(4px); box-shadow: none; }
        .btn-green { background-color: #4CAF50; color: white; box-shadow: 0 4px 0 #2e6b32; }
        .btn-green:active { transform: translateY(4px); box-shadow: none; }
        .btn-green:disabled { background-color: #888; box-shadow: none; cursor: not-allowed; }

        /* ประวัติการสแกนรอบปัจจุบัน */
        .history-box { text-align: left; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-top: 15px; max-height: 180px; overflow-y: auto; }
        .history-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; font-size: 0.9rem; color: #ddd; }
        .history-item:last-child { border: none; }
    </style>
</head>
<body>
    <div class="container">
        <img src="CYCLE.png" alt="Logo" class="logo-top">
        <div class="user-greeting" id="user-display">สวัสดีคุณสมาชิก</div>
        
        <div id="reader"></div>
        <div class="status-text" id="status">กำลังเปิดกล้อง...</div>
        
        <div style="margin-top: 10px;">
            <button class="btn btn-yellow" onclick="resumeScan()">สแกนขวดเพิ่ม</button>
            <button class="btn btn-green" id="confirmBtn" onclick="confirmData()">
                ยืนยันการสะสม (<span id="count-num">0</span> ชิ้น)
            </button>
        </div>
        
        <div class="history-box">
            <p style="margin: 0 0 10px 0; color: #FFD700; font-weight: bold; font-size: 0.9rem;">รายการที่คุณสแกนแล้ว:</p>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        // 1. URL ล่าสุดที่พี่ส่งมาครับ
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwsMkiz80Yg7Mfz8Xn_Z4YfeEIUIJ8Y7edd44ojaGzlI7gbQVtvBzNhnJuQ2m_4K_xk/exec";
        
        let scannedItems = [];
        let isScanning = true;
        let html5QrCode;

        // ดึงชื่อเล่นจากหน้าลงทะเบียนมาแสดง
        const nickName = localStorage.getItem('cycle_user_nickname') || "สมาชิก";
        document.getElementById('user-display').innerText = "สวัสดีคุณ " + nickName;

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 15, qrbox: { width: 250, height: 150 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    if (!isScanning) return;
                    
                    // ตรวจสอบรหัสซ้ำในรอบนี้
                    if (scannedItems.includes(decodedText)) {
                        document.getElementById('status').innerText = "⚠️ รหัสซ้ำกรุณาสแกนขวดใหม่";
                        return;
                    }

                    scannedItems.push(decodedText);
                    document.getElementById('status').innerText = "✅ เพิ่มสำเร็จ: " + decodedText;
                    document.getElementById('count-num').innerText = scannedItems.length;
                    
                    // เพิ่มรายการในประวัติ
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `✓ รหัสขวด: ${decodedText}`;
                    document.getElementById('history-list').prepend(item);
                    
                    isScanning = false; // หยุดสแกนเพื่อให้คนใช้กดสแกนต่อหรือยืนยัน
                }
            ).catch(err => {
                document.getElementById('status').innerText = "❌ กรุณาตรวจสอบสิทธิ์การใช้กล้อง";
            });
        }

        function resumeScan() {
            isScanning = true;
            document.getElementById('status').innerText = "รอสแกนขวดถัดไป...";
        }

        async function confirmData() {
            const userId = localStorage.getItem('cycle_user_id');
            if (!userId) {
                alert("ไม่พบข้อมูลสมาชิก กรุณาลงทะเบียนใหม่อีกครั้ง");
                window.location.href = "index.html";
                return;
            }
            if (scannedItems.length === 0) return alert("กรุณาสแกนขวดอย่างน้อย 1 ใบครับ");
            
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.innerText = "กำลังบันทึกพอยท์...";

            const data = {
                action: "scan",
                lineId: userId,
                bottleCount: scannedItems.length,
                bottleIds: scannedItems
            };

            try {
                // ส่งข้อมูลเข้า Google Sheets
                await fetch(WEB_APP_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify(data) 
                });
                
                // บันทึกเสร็จแล้ว วาร์ปไปหน้า My Point ทันที
                window.location.href = "mypoint.html";
                
            } catch (err) {
                alert('เกิดข้อผิดพลาด: ' + err.message);
                btn.disabled = false;
                btn.innerText = "ลองส่งใหม่อีกครั้ง";
            }
        }

        // เริ่มต้นกล้องเมื่อเข้าหน้าเว็บ
        window.onload = startCamera;
    </script>
</body>
</html>
