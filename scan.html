<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Scan - สะสมขวด</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background-color: #285B48; color: white; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .logo-top { width: 150px; margin-top: 20px; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; border: 4px solid #FFD700; background: black; margin: 15px 0; }
        .status-text { font-size: 1.1rem; margin: 15px 0; color: #FFD700; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; border: none; margin-bottom: 10px; }
        .btn-yellow { background-color: #FFD700; color: #285B48; }
        .btn-green { background-color: #4CAF50; color: white; }
        .scan-history { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <img src="CYCLE.png" alt="Logo" class="logo-top">
        <div id="reader"></div>
        <div class="status-text" id="status">รอการสแกน...</div>
        <span style="text-decoration: underline; cursor: pointer; font-size: 0.8rem;" onclick="location.reload()">รีเซ็ตกล้อง</span>
        <button class="btn btn-yellow" onclick="resumeScan()">สแกนเพิ่ม</button>
        <button class="btn btn-green" id="confirmBtn" onclick="confirmData()">ยืนยันข้อมูล (รวม <span id="count-num">0</span> ชิ้น)</button>
        <div class="scan-history">
            <p style="border-bottom: 1px solid #FFD700;">รายการที่พบ:</p>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwqKcqgRqDfgx-EnYYS7V9dhMenlmqVeTfexTEyPkXpZnWTBjjLWjz5_AmL0kyna28X/exec";
        let scannedItems = [];
        let isScanning = true;

        function onScanSuccess(decodedText) {
            if (!isScanning || scannedItems.includes(decodedText)) return;
            scannedItems.push(decodedText);
            document.getElementById('status').innerText = "✅ อ่านสำเร็จ: " + decodedText;
            document.getElementById('count-num').innerText = scannedItems.length;
            const item = document.createElement('div');
            item.innerHTML = `✓ ${decodedText}`;
            document.getElementById('history-list').prepend(item);
            isScanning = false;
        }

        function resumeScan() { isScanning = true; document.getElementById('status').innerText = "กำลังรออ่านต่อไป..."; }

        async function confirmData() {
            const userId = localStorage.getItem('cycle_user_id') || "GUEST";
            if (scannedItems.length === 0) return alert("ยังไม่ได้สแกนเลยครับ");
            
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.innerText = "กำลังบันทึกแต้ม...";

            const data = {
                action: "scan",
                lineId: userId,
                bottleCount: scannedItems.length,
                bottleIds: scannedItems
            };

            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert('บันทึกสำเร็จ ' + scannedItems.length + ' ขวด');
                location.reload(); // ล้างค่าเพื่อเริ่มใหม่
            } catch (err) { alert('ผิดพลาด'); btn.disabled = false; }
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
