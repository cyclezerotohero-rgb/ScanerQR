<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Smart Bin</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=FC+Iconic:wght@700&display=swap">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { text-align: center; font-family: 'FC Iconic', sans-serif; background-color: #f8f9fa; margin: 0; }
        .container { padding: 30px 20px; display: flex; flex-direction: column; min-height: 100vh; align-items: center; }
        .info-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px; border: 2px solid #1a4d2e; margin-top: 20px; }
        h2 { color: #1a4d2e; margin: 0; font-size: 28px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; font-family: 'FC Iconic'; }
        .btn-confirm { background: #1a4d2e; color: white; padding: 15px; width: 100%; border: none; border-radius: 30px; font-size: 18px; font-weight: 700; cursor: pointer; }
        
        #scan-page { display: none; }
        #video { width: 100%; border-radius: 15px; background: #000; margin-top: 20px; border: 4px solid #1a4d2e; max-width: 400px; }
        .btn-refresh { background: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 30px; font-size: 16px; margin-top: 15px; cursor: pointer; font-family: 'FC Iconic'; }

        /* Guide จอดำ + ลูกศรเด้ง */
        #guide-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; color: white; }
        .guide-text { position: absolute; bottom: 120px; right: 20px; left: 20px; background: white; color: #333; padding: 25px; border-radius: 20px; border: 3px solid #1a4d2e; }
        .arrow-point { position: absolute; bottom: 30px; right: 30px; font-size: 60px; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="setup-page" class="container">
        <img src="https://cyclezerotohero-rgb.github.io/ScanerQR/CYCLE.png" style="width: 120px; margin-bottom: 10px;">
        <div class="info-card">
            <h2>Cycle อยากรู้จัก!!</h2>
            <p style="color:#666; font-size:14px; margin-bottom: 20px;">โปรดกรอกข้อมูลและองค์กรของท่าน</p>
            <input type="text" id="real-name" placeholder="พิมพ์ชื่อของท่านที่นี่">
            <select id="org-select">
                <option value="โรงเรียนสารสาสน์วิเทศเชียงใหม่">โรงเรียนสารสาสน์วิเทศเชียงใหม่</option>
            </select>
            <button class="btn-confirm" onclick="saveInfo()">ยืนยันข้อมูล</button>
        </div>
    </div>

    <div id="scan-page" class="container">
        <h3 style="color:#1a4d2e;">สแกนบาร์โค้ดเพื่อรับแต้ม</h3>
        <p id="user-display" style="color:#1a4d2e; font-weight:bold;"></p>
        <video id="video" playsinline></video>
        <button class="btn-refresh" onclick="location.reload()">  รีเฟรชหน้าสแกน</button>
        <p id="status" style="margin-top:15px; color:#1a4d2e; font-weight:bold;">[ ส่องกล้องไปที่บาร์โค้ด ]</p>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:none; color:gray; text-decoration:underline; margin-top:20px; font-family:'FC Iconic';">แก้ไขชื่อ/องค์กร</button>
    </div>

    <div id="guide-overlay">
        <div class="guide-text">
            <h3 style="margin-top:0; color:#1a4d2e;">พบปัญหาจอดำ?</h3>
            <p style="font-size:18px;">กดที่ปุ่ม <b>"3 จุด"</b> หรือ <b>"เข็มทิศ"</b><br>มุมขวาล่าง แล้วเลือก<br><b>"เปิดในเบราว์เซอร์"</b> นะครับ</p>
        </div>
        <div class="arrow-point">👇</div>
    </div>

    <script>
        const myLiffId = "2009856940-tyxcN1rB"; 
        const myScriptUrl = "https://script.google.com/macros/s/AKfycbzon--LEO1cpZVyFFd7QXW4RL2ntQ4YrroequdJu-l_xakZcKs9G_175rQZBvYm-E-nHQ/exec"; 

        async function main() {
            await liff.init({ liffId: myLiffId });
            if (!liff.isLoggedIn()) liff.login();
            
            // ตรวจสอบความจำเครื่อง
            const n = localStorage.getItem('cycle_v1_name');
            const o = localStorage.getItem('cycle_v1_org');
            if (n && o) showScanPage(n);
        }

        function saveInfo() {
            const n = document.getElementById('real-name').value.trim();
            const o = document.getElementById('org-select').value;
            if(!n) return alert("กรุณากรอกชื่อก่อนนะครับ");
            localStorage.setItem('cycle_v1_name', n);
            localStorage.setItem('cycle_v1_org', o);
            showScanPage(n);
        }

        function showScanPage(name) {
            document.getElementById('setup-page').style.display = 'none';
            document.getElementById('scan-page').style.display = 'block';
            document.getElementById('user-display').innerText = "สวัสดีคุณ: " + name;
            startScanner();
        }

        async function startScanner() {
            const codeReader = new ZXing.BrowserMultiFormatReader();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                await document.getElementById('video').play();
                
                codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                    if (result) {
                        // เปลี่ยนสถานะทันทีเมื่อสแกนติด
                        document.getElementById('status').innerText = "⏳ กำลังตรวจสอบรหัส...";
                        document.getElementById('status').style.color = "orange";
                        
                        sendData(result.text);
                        codeReader.reset();
                        stream.getTracks().forEach(t => t.stop());
                    }
                });
            } catch (err) {
                document.getElementById('guide-overlay').style.display = 'block';
            }
        }

        async function sendData(barcode) {
            const profile = await liff.getProfile();
            const n = localStorage.getItem('cycle_v1_name');
            const o = localStorage.getItem('cycle_v1_org');
            
            try {
                const response = await fetch(myScriptUrl, {
                    method: "POST",
                    body: JSON.stringify({
                        userId: profile.userId,
                        realName: n, 
                        organization: o, 
                        barcode: barcode
                    })
                });
                const res = await response.text();

                if (res.toUpperCase().includes("SUCCESS")) {
                    alert("✅ บันทึกสำเร็จ! กำลังพาไปรับแต้มครับ");
                    // วาร์ปไปที่บัตรสะสมแต้ม
                    window.location.href = "https://u.lin.ee/YHZFi0j"; 
                } else if (res.toUpperCase().includes("DUPLICATE")) {
                    alert("❌ บาร์โค้ดนี้ถูกสแกนไปแล้วครับ!");
                    location.reload();
                }
            } catch (e) { 
                alert("การส่งข้อมูลขัดข้อง"); 
                location.reload();
            }
        }
        main();
    </script>
</body>
</html>
