<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Smart Bin</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 350px; margin: auto; border: 2px solid #1a4d2e; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #1a4d2e; color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; }
        #video { width: 100%; border-radius: 12px; margin-top: 15px; border: 3px solid #1a4d2e; }
    </style>
</head>
<body>

    <div id="setup-page" class="card">
        <h2 style="color: #1a4d2e;">ลงทะเบียนสแกน</h2>
        <input type="text" id="real-name" placeholder="ชื่อ-นามสกุล">
        <select id="org-select">
            <option value="โรงเรียนสารสาสน์วิเทศเชียงใหม่">โรงเรียนสารสาสน์วิเทศเชียงใหม่</option>
        </select>
        <button onclick="saveInfo()">ยืนยันข้อมูล</button>
    </div>

    <div id="scan-page" style="display:none;" class="card">
        <h3 id="user-display"></h3>
        <video id="video" playsinline></video>
        <p id="status">กำลังรอสแกน...</p>
        <button onclick="clearData()" style="background:none; color:gray; text-decoration:underline;">เปลี่ยนชื่อใหม่</button>
    </div>

    <script>
        const myLiffId = "2009856940-tyxcN1rB"; 
        const myScriptUrl = "https://script.google.com/macros/s/AKfycbzon--LEO1cpZVyFFd7QXW4RL2ntQ4YrroequdJu-l_xakZcKs9G_175rQZBvYm-E-nHQ/exec"; 

        async function main() {
            await liff.init({ liffId: myLiffId });
            if (!liff.isLoggedIn()) liff.login();
            
            const n = localStorage.getItem('c_name');
            const o = localStorage.getItem('c_org');
            if (n && o) showScan(n);
        }

        function saveInfo() {
            const n = document.getElementById('real-name').value.trim();
            const o = document.getElementById('org-select').value;
            if(!n) return alert("กรุณากรอกชื่อ");
            localStorage.setItem('c_name', n);
            localStorage.setItem('c_org', o);
            showScan(n);
        }

        function showScan(n) {
            document.getElementById('setup-page').style.display = 'none';
            document.getElementById('scan-page').style.display = 'block';
            document.getElementById('user-display').innerText = "คุณ: " + n;
            startCam();
        }

        function clearData() {
            localStorage.clear();
            location.reload();
        }

        async function startCam() {
            const reader = new ZXing.BrowserMultiFormatReader();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
            reader.decodeFromVideoDevice(null, 'video', (res) => {
                if (res) {
                    sendData(res.text);
                    reader.reset();
                    stream.getTracks().forEach(t => t.stop());
                }
            });
        }

        async function sendData(barcode) {
            const profile = await liff.getProfile();
            // ดึงค่าสดๆ จากเครื่องก่อนส่ง
            const n = localStorage.getItem('c_name');
            const o = localStorage.getItem('c_org');
            
            document.getElementById('status').innerText = "กำลังส่งข้อมูล...";

            try {
                await fetch(myScriptUrl, {
                    method: "POST",
                    body: JSON.stringify({
                        userId: profile.userId,
                        userName: n,        // ชื่อตัวแปรต้องตรงกับ Apps Script
                        userLocation: o,    // ชื่อตัวแปรต้องตรงกับ Apps Script
                        barcode: barcode
                    })
                });
                alert("บันทึกสำเร็จ!");
                liff.closeWindow();
            } catch (e) { alert("เชื่อมต่อไม่ได้"); }
        }
        main();
    </script>
</body>
</html>
