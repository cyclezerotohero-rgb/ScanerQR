<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        /* หน้าจอแนะนำแบบชี้มุมขวาล่าง */
        #guide-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            z-index: 9999;
            text-align: center;
        }
        .instruction-box {
            position: absolute;
            bottom: 120px; /* ขยับขึ้นมาเหนือลูกศร */
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: #333;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffcf00;
        }
        .arrow-down {
            position: absolute;
            bottom: 30px;
            right: 40px; /* ชี้ไปมุมขวาล่าง */
            font-size: 60px;
            color: #ffcf00;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }
    </style>
</head>
<body style="text-align: center; font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding-top: 50px;">
    
    <div id="guide-overlay">
        <div class="instruction-box">
            <h2 style="color: #ffcf00; margin-top: 0;">พบปัญหาจอดำ?</h2>
            <p>กรุณากดที่ปุ่ม <b>"แชร์"</b> หรือ <b>"เข็มทิศ"</b><br>ที่มุมขวาล่าง</p>
            <p>แล้วเลือก <b>"เปิดในเบราว์เซอร์"</b><br>(Open in Browser)</p>
        </div>
        <div class="arrow-down">↘️</div>
    </div>

    <h3>แสกนบาร์โค้ดที่ขวดน้ำ</h3>
    
    <div style="width: 90%; max-width: 400px; margin: 20px auto; position: relative;">
        <video id="video" playsinline style="width: 100%; border-radius: 15px; background: #000;"></video>
        <div style="position: absolute; top: 50%; left: 10%; right: 10%; border-top: 2px solid red; opacity: 0.5;"></div>
    </div>
    
    <p id="status" style="color: #666; padding: 0 20px;">กำลังเริ่มต้นระบบ...</p>
    <button onclick="location.reload()" style="padding: 10px 20px; border-radius: 20px; border: none; background: #00b900; color: white;">รีเฟรชหน้าจอ</button>

    <script>
        // ใส่ ID และ URL ของพี่เหมือนเดิมนะคั้บ
        const myLiffId = "2009856940-tyxcN1rB"; 
        const myScriptUrl = "https://script.google.com/macros/s/AKfycbzon--LEO1cpZVyFFd7QXW4RL2ntQ4Yrro.../exec";

        async function main() {
            try {
                await liff.init({ liffId: myLiffId });
                
                // ถ้าเปิดในแอป LINE ให้โชว์ตัวช่วยชี้เป้าทันที
                if (liff.isInClient()) {
                    document.getElementById('guide-overlay').style.display = 'block';
                }

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    startScanner();
                }
            } catch (err) {
                document.getElementById('status').innerText = "ระบบขัดข้อง: " + err.message;
            }
        }

        async function startScanner() {
            const codeReader = new ZXing.BrowserMultiFormatReader();
            const statusElt = document.getElementById('status');
            const videoElt = document.getElementById('video');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoElt.srcObject = stream;
                await videoElt.play();

                codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                    if (result) {
                        statusElt.innerText = "พบรหัส: " + result.text;
                        sendData(result.text);
                        codeReader.reset();
                        stream.getTracks().forEach(track => track.stop());
                    }
                });
            } catch (error) {
                // ถ้ากล้องไม่ติด (จอดำ) ก็จะโชว์ Overlay เหมือนเดิม
                document.getElementById('guide-overlay').style.display = 'block';
            }
        }

        async function sendData(barcode) {
            const profile = await liff.getProfile();
            fetch(myScriptUrl, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify({
                    userId: profile.userId,
                    userName: profile.displayName,
                    barcode: barcode
                })
            }).then(() => {
                alert("บันทึกข้อมูลเรียบร้อย!");
                liff.closeWindow();
            });
        }
        main();
    </script>
</body>
</html>
