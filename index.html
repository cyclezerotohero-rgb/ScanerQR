<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Smart Bin</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 350px; margin: 20px auto; border: 2px solid #1a4d2e; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #1a4d2e; color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #video { width: 100%; border-radius: 15px; margin-top: 15px; border: 3px solid #1a4d2e; background: #000; }
        .btn-refresh { background: #28a745; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="setup-page" class="card">
        <h2 style="color: #1a4d2e;">Cycle Smart Bin</h2>
        <p style="color: #666;">กรุณากรอกข้อมูลเพื่อเริ่มต้น</p>
        <input type="text" id="real-name" placeholder="ชื่อ - นามสกุล">
        <select id="org-select">
            <option value="โรงเรียนสารสาสน์วิเทศเชียงใหม่">โรงเรียนสารสาสน์วิเทศเชียงใหม่</option>
        </select>
        <button onclick="saveInfo()">ยืนยันข้อมูล</button>
    </div>

    <div id="scan-page" style="display:none;" class="card">
        <h3 id="user-display" style="color: #1a4d2e; margin-top: 0;"></h3>
        <video id="video" playsinline></video>
        <p id="status" style="color: #666; font-weight: bold;">[ ส่องกล้องไปที่บาร์โค้ด ]</p>
        <button class="btn-refresh" onclick="location.reload()"> รีเฟรชหน้าสแกน</button>
        <button onclick="clearData()" style="background:none; color:#1a4d2e; text-decoration:underline; font-size:12px; margin-top:20px;">แก้ไขข้อมูลส่วนตัว</button>
    </div>

    <script>
        const myLiffId = "2009856940-tyxcN1rB"; 
        const myScriptUrl = "https://script.google.com/macros/s/AKfycbzon--LEO1cpZVyFFd7QXW4RL2ntQ4YrroequdJu-l_xakZcKs9G_175rQZBvYm-E-nHQ/exec"; 

        async function main() {
            await liff.init({ liffId: myLiffId });
            if (!liff.isLoggedIn()) liff.login();
            
            // เช็คว่าเคยกรอกชื่อไว้หรือยัง
            const n = localStorage.getItem('user_name');
            const o = localStorage.getItem('user_org');
            if (n && o) showScan(n);
        }

        function saveInfo() {
            const n = document.getElementById('real-name').value.trim();
            const o = document.getElementById('org-select').value;
            if(!n) return alert("กรุณากรอกชื่อก่อนนะครับ");
            
            // เซฟลงความจำเครื่อง
            localStorage.setItem('user_name', n);
            localStorage.setItem('user_org', o);
            showScan(n);
        }

        function showScan(n) {
            document.getElementById('setup-page').style.display = 'none';
            document.getElementById('scan-page').style.display = 'block';
            document.getElementById('user-display').innerText = "คุณ: " + n;
            startCamera();
        }

        function clearData() {
            localStorage.removeItem('user_name');
            localStorage.removeItem('user_org');
            location.reload();
        }

        async function startCamera() {
            const codeReader = new ZXing.BrowserMultiFormatReader();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                await document.getElementById('video').play();
                
                codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                    if (result) {
                        sendToSheet(result.text);
                        codeReader.reset();
                        stream.getTracks().forEach(t => t.stop());
                    }
                });
            } catch (err) { alert("ไม่สามารถเข้าถึงกล้องได้"); }
        }

        async function sendToSheet(barcode) {
            const profile = await liff.getProfile();
            // ดึงชื่อและสถานที่จากความจำเครื่องมาส่ง
            const n = localStorage.getItem('user_name');
            const o = localStorage.getItem('user_org');
            
            document.getElementById('status').innerText = "กำลังบันทึกข้อมูล...";

            try {
                const response = await fetch(myScriptUrl, {
                    method: "POST",
                    body: JSON.stringify({
                        userId: profile.userId,
                        send_name: n,      // ชื่อตัวแปรต้องตรงกับ Apps Script
                        send_place: o,     // ชื่อตัวแปรต้องตรงกับ Apps Script
                        barcode: barcode
                    })
                });
                
                const result = await response.text();
                if (result.toUpperCase().includes("SUCCESS")) {
                    alert("✅ บันทึกข้อมูลสำเร็จ! ขอบคุณครับคุณ " + n);
                    liff.closeWindow();
                } else if (result.toUpperCase().includes("DUPLICATE")) {
                    alert("❌ บาร์โค้ดนี้ถูกสแกนไปแล้วครับ");
                    location.reload();
                }
            } catch (e) { alert("เชื่อมต่อฐานข้อมูลไม่ได้ กรุณาลองใหม่"); }
        }
        main();
    </script>
</body>
</html>
