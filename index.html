<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน - CYCLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background-color: #285B48; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 400px; padding: 20px; text-align: center; }
        .logo { width: 120px; margin-bottom: 20px; }
        h2 { margin-bottom: 20px; font-weight: 700; }
        
        .form-group { text-align: left; margin-bottom: 15px; width: 100%; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: none; font-family: 'Kanit'; box-sizing: border-box; color: #333; }
        
        .btn-submit { width: 100%; padding: 15px; border-radius: 15px; background-color: #FFD700; color: #285B48; border: none; font-size: 1.2rem; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #c7a800; }
        .btn-submit:active { transform: translateY(4px); box-shadow: none; }
        .btn-submit:disabled { background-color: #ccc; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="CYCLE.png" alt="Logo" class="logo">
    <h2>ลงทะเบียนสมาชิก</h2>
    
    <div class="form-group">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="fullname" placeholder="ระบุชื่อและนามสกุล">
    </div>
    
    <div class="form-group">
        <label>ชื่อเล่น</label>
        <input type="text" id="nickname" placeholder="ระบุชื่อเล่น">
    </div>
    
    <div class="form-group">
        <label>วันเกิด</label>
        <input type="date" id="birthdate">
    </div>
    
    <div class="form-group">
        <label>โรงเรียน/หน่วยงาน</label>
        <select id="dept">
            <option value="">เลือกหน่วยงาน</option>
            <option value="โรงเรียนสารสาสน์">โรงเรียนสารสาสน์</option>
            <option value="อื่นๆ">อื่นๆ</option>
        </select>
    </div>

    <button class="btn-submit" id="regBtn" onclick="register()">ลงทะเบียน</button>
</div>

<script>
    // ระบบ Auto-Login
    window.onload = function() {
        if (localStorage.getItem('cycle_user_id')) {
            window.location.href = "scan.html";
        }
    };

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwsMkiz80Yg7Mfz8Xn_Z4YfeEIUIJ8Y7edd44ojaGzlI7gbQVtvBzNhnJuQ2m_4K_xk/exec";

    async function register() {
        const btn = document.getElementById('regBtn');
        const fullname = document.getElementById('fullname').value;
        const nickname = document.getElementById('nickname').value;
        const birthdate = document.getElementById('birthdate').value;
        const dept = document.getElementById('dept').value;

        if (!fullname || !nickname || !birthdate || !dept) {
            alert("กรุณากรอกข้อมูลให้ครบถ้วนครับ");
            return;
        }

        btn.disabled = true;
        btn.innerText = "กำลังบันทึก...";

        const myId = "MB" + Date.now().toString().slice(-6);

        const data = {
            action: "register",
            lineId: myId,
            fullname: fullname,
            nickname: nickname,
            birthdate: birthdate,
            dept: dept
        };

        try {
            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(data) 
            });

            // บันทึกข้อมูลลงเครื่อง
            localStorage.setItem('cycle_user_id', myId);
            localStorage.setItem('cycle_user_fullname', data.fullname);
            localStorage.setItem('cycle_user_nickname', data.nickname);
            localStorage.setItem('cycle_user_birthdate', data.birthdate);
            localStorage.setItem('cycle_user_dept', data.dept);

            alert('ลงทะเบียนสำเร็จ!');
            window.location.href = "scan.html"; 
            
        } catch (err) {
            alert('เกิดข้อผิดพลาด: ' + err.message);
            btn.disabled = false;
            btn.innerText = "ลงทะเบียน";
        }
    }
</script>

</body>
</html>
