<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=FC+Iconic:wght@700&display=swap">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body {
            text-align: center;
            font-family: 'FC Iconic', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        h3 {
            font-weight: 700;
            font-size: 26px;
            margin-top: 40px;
            color: #1a4d2e; /* สีเขียวแบรนด์ */
        }
        
        /* หน้าจอแนะนำแบบชี้มุมขวาล่าง */
        #guide-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            z-index: 9999;
            text-align: center;
        }
        
        /* กล่องข้อความแนะนำ (ปรับสไตล์ให้เข้ากับแบรนด์) */
        .instruction-box {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: rgba(255,255,255,0.95); /* กล่องสีขาวใส */
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #1a4d2e; /* เส้นขอบสีเขียวแบรนด์ */
            color: #333; /* ตัวหนังสือสีดำ */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        /* การ์ตูน LOGO SORRY (น้องเมฆใส่หมวก) */
        .brand-mascot {
            width: 150px; /* ขนาดการ์ตูน */
            height: auto;
            margin-bottom: -10px; /* ขยับลงมาให้ชิดขอบกล่อง */
            margin-top: -60px; /* ดันขึ้นไปให้โผล่พ้นกล่อง */
        }
        
        /* ลูกศรชี้มุมขวาล่างแบบ CSS สามเหลี่ยม (สีเขียวแบรนด์) */
        .arrow-point {
            position: absolute;
            bottom: 30px; /* ตำแหน่งเกือบติดขอบล่าง */
            right: 40px; /* ตำแหน่งเกือบติดขอบขวา */
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 20px solid #1a4d2e; /* สีเขียวแบรนด์ */
            transform: rotate(-135deg); /* หมุนให้ชี้ไปมุม */
            
            /* Animation ที่ทำให้เด้งและชี้ไปทางมุม */
            animation: bounce-point 1s infinite alternate ease-in-out;
        }
        
        /* Animation สำหรับลูกศรชี้มุม */
        @keyframes bounce-point {
            0% { transform: translate(0, 0) rotate(-135deg); }
            100% { transform: translate(15px, 15px) rotate(-135deg); }
        }
        
        /* ปรับปรุงปุ่มรีเฟรชให้พอดีตัวหนังสือ */
        .btn-refresh {
            padding: 8px 25px;
            border-radius: 25px;
            border: none;
            background: #1a4d2e; /* สีเขียวแบรนด์ */
            color: white;
            font-family: 'FC Iconic', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: inline-block;
            margin: 10px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .btn-refresh:active {
            transform: scale(0.95);
        }
        .logo-container {
            margin-top: auto; 
            padding-bottom: 40px;
        }
        .brand-logo {
            width: 180px;
            height: auto;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    
    <div id="guide-overlay">
        
        <div style="margin-top: 150px;">
            <img src="https://cyclezerotohero-rgb.github.io/ScanerQR/LOGO SORRY.png" class="brand-mascot" alt="CYCLE Mascot">
        </div>
        
        <div class="instruction-box">
            <h2 style="color: #1a4d2e; margin-top: 0; font-size: 30px;">พบปัญหาจอดำ?</h2>
            <p>กรุณากดที่ปุ่ม <b>"แชร์"</b> หรือ <b>"เข็มทิศ"</b><br>ที่มุมขวาล่าง</p>
            <p>แล้วเลือก <b>"เปิดในเบราว์เซอร์"</b></p>
        </div>
        <div class="arrow-point"></div>
    </div>

    <h3>สแกนบาร์โค้ดที่ขวดน้ำ</h3>
    
    <div style="width: 90%; max-width: 400px; margin: 20px auto; position: relative;">
        <video id="video" playsinline style="width: 100%; border-radius: 15px; background: #000;"></video>
        <div style="position: absolute; top: 50%; left: 10%; right: 10%; border-top: 2px solid red; opacity: 0.6;"></div>
    </div>
    
    <p id="status" style="color: #666; padding: 0 20px;">กำลังเริ่มต้นระบบ...</p>
    
    <div>
        <button class="btn-refresh" onclick="location.reload()">รีเฟรชหน้าจอ</button>
    </div>
