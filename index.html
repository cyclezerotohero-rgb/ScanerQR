<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=FC+Iconic:wght@700&display=swap">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body {
            text-align: center;
            font-family: 'FC Iconic', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        h3 {
            font-weight: 700;
            font-size: 26px;
            margin-top: 40px;
            color: #1a4d2e;
        }
        
        /* หน้าจอแนะนำแบบชี้มุมขวาล่าง */
        #guide-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            z-index: 9999;
            text-align: center;
        }
        
        /* กล่องข้อความแนะนำ */
        .instruction-box {
            position: absolute;
            bottom: 150px; 
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background: #333;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ffcf00;
        }
        
        /* ลูกศรใหญ่และชี้มุมชัดเจน */
        .arrow-down {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 80px;
            color: #295B48;
            animation: bounce-point 1s infinite alternate ease-in-out;
        }
        
        @keyframes bounce-point {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(15px, 15px) rotate(-15deg); }
        }
        
        .btn-refresh {
            padding: 8px 25px;
            border-radius: 25px;
            border: none;
            background: #1a4d2e;
            color: white;
            font-family: 'FC Iconic', sans-serif;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: inline-block;
            margin: 10px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .btn-refresh:active {
            transform: scale(0.95);
        }
        .logo-container {
            margin-top: auto; 
            padding-bottom: 40px;
        }
        .brand-logo {
            width: 180px;
            height: auto;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    
    <div id="guide-overlay">
        <div class="instruction-box">
            <h2 style="color: #ffcf00; margin-top: 0;">พบปัญหาจอดำ?</h2>
            <p>กรุณากดที่ปุ่ม <b>"แชร์"</b> หรือ <b>"เข็มทิศ"</b><br>ที่มุมขวาล่าง</p>
            <p>แล้วเลือก <b>"เปิดในเบราว์เซอร์"</b></p>
        </div>
        <div class="arrow-down">↘️</div>
    </div>

    <h3>สแกนบาร์โค้ดที่ขวดน้ำ</h3>
    
    <div style="width: 90%; max-width: 400px; margin: 20px auto; position: relative;">
        <video id="video" playsinline style="width: 100%; border-radius: 15px; background: #000;"></video>
        <div style="position: absolute; top: 50%; left: 10%; right: 10%; border-top: 2px solid #ff4444; opacity: 0.7;"></div>
    </div>
    
    <p id="status" style="color: #666; padding: 0 20px;">สแกนได้เลย!!...</p>
    
    <div>
        <button class="btn-refresh" onclick="location.reload()">รีเฟรชหน้าจอ</button>
    </div>

    <div class="logo-container">
        <img src="https://cyclezerotohero-rgb.github.io/ScanerQR/CYCLE.png" class="brand-logo" alt="CYCLE Logo">
    </div>

    <script>
        // อย่าลืมใส่ ID และ URL ของพี่นะคั้บ
        const myLiffId = "2009856940-tyxcN1rB"; 
        const myScriptUrl = "https://script.google.com/macros/s/AKfycbzon--LEO1cpZVyFFd7QXW4RL2ntQ4YrroH9S0v0hO2r666R_XyU7lPqI2Y0qY5T_8/exec"; 

        async function main() {
            try {
                await liff.init({ liffId: myLiffId });
                
                // เช็คว่าเปิดในแอป LINE หรือไม่
                if (liff.isInClient()) {
                    document.getElementById('guide-overlay').style.display = 'block';
                }

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    startScanner();
                }
            } catch (err) {
                document.getElementById('status').innerText = "LIFF Error: " + err.message;
            }
        }

        async function startScanner() {
            const codeReader = new ZXing.BrowserMultiFormatReader();
            const videoElt = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                videoElt.srcObject = stream;
                await videoElt.play();
                codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                    if (result) {
                        sendData(result.text);
                        codeReader.reset();
                        stream.getTracks().forEach(track => track.stop());
                    }
                });
            } catch (error) {
                // ถ้ากล้องเปิดไม่ได้ ก็จะโชว์ Overlay ชี้เป้า
                document.getElementById('guide-overlay').style.display = 'block';
            }
        }

        async function sendData(barcode) {
            const profile = await liff.getProfile();
            fetch(myScriptUrl, {
                method: "POST",
                mode: "no-cors", 
                body: JSON.stringify({
                    userId: profile.userId,
                    userName: profile.displayName,
                    barcode: barcode
                })
            }).then(() => {
                alert("บันทึกข้อมูลเรียบร้อย!");
                liff.closeWindow();
            });
        }
        main();
    </script>
</body>
</html>
