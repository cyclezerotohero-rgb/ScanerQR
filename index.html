<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน Cycle Member</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <script>
        // --- ส่วนตรวจสอบสถานะการลงทะเบียน ---
        const savedId = localStorage.getItem('cycle_user_id');
        if (savedId) {
            window.location.href = "scan.html"; // ถ้าเคยลงทะเบียนแล้ว ให้ไปหน้าสแกนทันที
        }
    </script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background-color: #285B48; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .logo-main { width: 180px; margin-bottom: 10px; }
        h2 { color: #ffffff; margin-bottom: 25px; font-weight: 400; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; color: #ffffff; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { width: 100%; height: 50px; padding: 0 15px; border-radius: 12px; border: none; box-sizing: border-box; font-family: 'Kanit', sans-serif; font-size: 1rem; background-color: #ffffff; }
        .btn-submit { width: 100%; padding: 15px; background-color: #FFD700; color: #285B48; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #c7a800; }
    </style>
</head>
<body>
    <div class="container">
        <img src="CYCLE.png" alt="Cycle Logo" class="logo-main">
        <h2>ลงทะเบียนสมาชิก</h2>
        <div class="form-group"><label>ชื่อ-นามสกุล</label><input type="text" id="fullname" placeholder="สมชาย รักโลก"></div>
        <div class="form-group"><label>ชื่อเล่น</label><input type="text" id="nickname" placeholder="ต้น"></div>
        <div class="form-group"><label>วันเกิด (วว/ดด/25xx)</label><input type="text" id="birthdate" placeholder="วว/ดด/25xx" maxlength="10"></div>
        <div class="form-group">
            <label>องค์กร/โรงเรียน</label>
            <select id="organization">
                <option value="" disabled selected>-- คลิกเพื่อเลือก --</option>
                <option value="โรงเรียนสารสาสน์วิเทศเชียงใหม่">โรงเรียนสารสาสน์วิเทศเชียงใหม่</option>
            </select>
        </div>
        <button class="btn-submit" id="submitBtn" onclick="sendData()">ลงทะเบียน</button>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyy-_ZTGLnwEFDiGV71Zj1gi5t9VoUPxrOfB2CuHHruqHPkP96wqNSHcMguE4Ui3hM/exec";

        async function sendData() {
            const btn = document.getElementById('submitBtn');
            const nick = document.getElementById('nickname').value.trim();
            const myId = "USR-" + Date.now(); 
            
            const data = {
                action: "register",
                lineId: myId,
                fullname: document.getElementById('fullname').value.trim(),
                nickname: nick,
                birthdate: document.getElementById('birthdate').value.trim(),
                dept: document.getElementById('organization').value
            };

            if(!data.fullname || !nick || !data.birthdate || !data.dept) {
                alert('กรุณากรอกข้อมูลให้ครบนะครับ'); return;
            }

            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                // บันทึก ID และ ชื่อเล่น ลงในเครื่อง
                localStorage.setItem('cycle_user_id', myId);
                localStorage.setItem('cycle_user_name', nick);
                alert('ลงทะเบียนสำเร็จ!');
                window.location.href = "scan.html";
            } catch (err) { alert('เกิดข้อผิดพลาด'); btn.disabled = false; }
        }
    </script>
</body>
</html>
