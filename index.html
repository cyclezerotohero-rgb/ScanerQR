<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle Smart Bin</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 350px; margin: auto; border: 2px solid #1a4d2e; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #1a4d2e; color: white; border: none; padding: 15px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #video { width: 100%; border-radius: 12px; margin-top: 15px; border: 3px solid #1a4d2e; background: #000; }
    </style>
</head>
<body>

    <div id="setup-page" class="card">
        <h2 style="color: #1a4d2e;">กรอกข้อมูลผู้ใช้งาน</h2>
        <input type="text" id="real-name" placeholder="ชื่อ - นามสกุล">
        <select id="org-select">
            <option value="โรงเรียนสารสาสน์วิเทศเชียงใหม่">โรงเรียนสารสาสน์วิเทศเชียงใหม่</option>
        </select>
        <button onclick="saveInfo()">เริ่มใช้งาน</button>
    </div>

    <div id="scan-page" style="display:none;" class="card">
        <h3 id="user-display" style="color: #1a4d2e; margin-top: 0;"></h3>
        <video id="video" playsinline></video>
        <p id="status" style="color: #666;">รอการสแกนบาร์โค้ด...</p>
        <button onclick="location.reload()" style="background:#28a745;">  รีเฟรชกล้อง</button>
    </div>

    <script>
        const myLiffId = "2009856940-tyxcN1rB"; 
        const myScriptUrl = "https://script.google.com/macros/s/AKfycbzon--LEO1cpZVyFFd7QXW4RL2ntQ4YrroequdJu-l_xakZcKs9G_175rQZBvYm-E-nHQ/exec"; 

        async function main() {
            await liff.init({ liffId: myLiffId });
            if (!liff.isLoggedIn()) liff.login();
            
            const n = localStorage.getItem('user_name');
            const o = localStorage.getItem('user_org');
            if (n && o) showScan(n);
        }

        function saveInfo() {
            const n = document.getElementById('real-name').value.trim();
            const o = document.getElementById('org-select').value;
            if(!n) return alert("กรุณากรอกชื่อก่อนนะครับ");
            localStorage.setItem('user_name', n);
            localStorage.setItem('user_org', o);
            showScan(n);
        }

        function showScan(n) {
            document.getElementById('setup-page').style.display = 'none';
            document.getElementById('scan-page').style.display = 'block';
            document.getElementById('user-display').innerText = "คุณ: " + n;
            startCamera();
        }

        async function startCamera() {
            const codeReader = new ZXing.BrowserMultiFormatReader();
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                await video.play();
                
                codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                    if (result) {
                        sendData(result.text);
                        codeReader.reset();
                        stream.getTracks().forEach(track => track.stop());
                    }
                });
            } catch (err) { alert("ไม่สามารถเปิดกล้องได้"); }
        }

        async function sendData(barcode) {
            const profile = await liff.getProfile();
            const name = localStorage.getItem('user_name');
            const org = localStorage.getItem('user_org');
            document.getElementById('status').innerText = "กำลังบันทึกข้อมูล...";

            try {
                const response = await fetch(myScriptUrl, {
                    method: "POST",
                    body: JSON.stringify({
                        userId: profile.userId,
                        userName: name,
                        userLocation: org,
                        barcode: barcode
                    })
                });
                const resText = await response.text();
                if (resText.toUpperCase().includes("SUCCESS")) {
                    alert("✅ บันทึกข้อมูลสำเร็จ!");
                    liff.closeWindow();
                } else if (resText.toUpperCase().includes("DUPLICATE")) {
                    alert("❌ บาร์โค้ดนี้ถูกสแกนไปแล้ว");
                    location.reload();
                }
            } catch (e) { alert("เชื่อมต่อผิดพลาด"); }
        }
        main();
    </script>
</body>
</html>
