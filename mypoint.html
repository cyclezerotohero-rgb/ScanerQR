<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Point - CYCLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background-color: #1a3a2e; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header-point { align-self: flex-end; margin: 20px 30px 0 0; font-size: 1.1rem; }
        .header-point span { color: #FFD700; font-weight: bold; font-size: 1.5rem; }

        /* บัตรสมาชิกใบใหม่ */
        .card-container {
            position: relative;
            width: 380px;
            height: 240px;
            margin-top: 30px;
            background-image: url('card.jpg'); /* ใช้ไฟล์ card.jpg ของพี่ */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* วางตำแหน่งข้อมูลบนบัตร */
        .info-text { position: absolute; color: white; font-size: 0.85rem; font-weight: 400; }
        
        #display-id { top: 108px; left: 190px; color: #1a3a2e; font-weight: bold; font-size: 0.95rem; } /* ช่อง ID สีขาว */
        #display-name { top: 132px; left: 170px; } /* หลัง NAME : */
        #display-date { top: 154px; left: 170px; } /* หลัง DATE : */
        #display-dept { top: 176px; left: 170px; } /* หลัง Dept : */
        #display-nickname { top: 162px; left: 45px; font-weight: bold; font-size: 1.1rem; color: #ffffff; text-align: center; width: 60px; } /* กลางฟันหนู */

        .btn-exchange {
            margin-top: 50px;
            background: white;
            color: #1a3a2e;
            padding: 12px 60px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="header-point">
        แต้มของคุณ: <span id="current-points">0</span> พอยท์
    </div>

    <div class="card-container">
        <div class="info-text" id="display-id"></div>
        <div class="info-text" id="display-name"></div>
        <div class="info-text" id="display-date"></div>
        <div class="info-text" id="display-dept"></div>
        <div class="info-text" id="display-nickname"></div>
    </div>

    <a href="#" class="btn-exchange">แลกพอยท์</a>

    <script>
        window.onload = function() {
            // ดึงข้อมูลที่เก็บไว้ตอนลงทะเบียนมาโชว์
            document.getElementById('display-id').innerText = localStorage.getItem('cycle_user_id') || "";
            document.getElementById('display-name').innerText = localStorage.getItem('cycle_user_fullname') || "";
            document.getElementById('display-date').innerText = localStorage.getItem('cycle_user_birthdate') || "";
            document.getElementById('display-dept').innerText = localStorage.getItem('cycle_user_dept') || "";
            
            const nickname = localStorage.getItem('cycle_user_nickname') || "";
            document.getElementById('display-nickname').innerText = nickname;
        };
    </script>
</body>
</html>
